services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: account-center:latest
    ports:
      - "1742:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      CONFIG_DIR: /app/runtime-config
      CONFIG_ENV_FILE: app.env
    volumes:
      - ./deploy/config:/app/runtime-config:ro
    restart: unless-stopped
